<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#15171c"/>
      <stop offset="100%" stop-color="#08090b"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.16)"/>
      <stop offset="65%" stop-color="rgba(255,255,255,0.04)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Compass icon centered around (400, 315), scale=15 -->
  <circle cx="400" cy="315" r="260" fill="url(#glow)"/>
  <circle cx="400" cy="315" r="150" fill="none" stroke="white" stroke-width="22"
          stroke-linecap="round" stroke-linejoin="round"/>
  <polygon points="463.6,251.4 431.8,346.8 336.4,378.6 368.2,283.2"
           fill="none" stroke="white" stroke-width="22"
           stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Wordmark next to the compass -->
  <text x="610" y="358"
        font-family="Helvetica, Arial, sans-serif"
        font-size="138" font-weight="600" letter-spacing="-4"
        fill="white">traces</text>
</svg>
