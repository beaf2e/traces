<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#181a1f"/>
      <stop offset="100%" stop-color="#08090b"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.16)"/>
      <stop offset="60%" stop-color="rgba(255,255,255,0.05)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>
  <!-- Full bleed so adaptive crop never reveals edges -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Compose inside the inner 80% safe zone (radius ≤ ~410 from center). -->
  <circle cx="512" cy="512" r="320" fill="url(#glow)"/>

  <!-- lucide Compass scaled smaller (scale=22) so it stays inside safe zone -->
  <g fill="none" stroke="white" stroke-width="40" stroke-linecap="round" stroke-linejoin="round">
    <!-- circle r=10 → r=220 -->
    <circle cx="512" cy="512" r="220"/>
    <!-- needle scaled by 22 -->
    <polygon points="605.28,418.72 558.64,558.64 418.72,605.28 465.36,465.36"/>
  </g>
</svg>
