<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#15171c"/>
      <stop offset="100%" stop-color="#08090b"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="48%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="60%" stop-color="rgba(255,255,255,0.05)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- ambient glow -->
  <circle cx="512" cy="512" r="380" fill="url(#glow)"/>

  <!-- lucide Compass (24-unit), scaled to 1024 canvas: scale=30, center=(512,512) -->
  <g fill="none" stroke="white" stroke-width="48" stroke-linecap="round" stroke-linejoin="round">
    <!-- circle r=10 → r=300 -->
    <circle cx="512" cy="512" r="300"/>
    <!-- needle: original points (16.24,7.76)(14.12,14.12)(7.76,16.24)(9.88,9.88) -->
    <polygon points="639.2,384.8 575.6,575.6 384.8,639.2 448.4,448.4"/>
  </g>
</svg>
